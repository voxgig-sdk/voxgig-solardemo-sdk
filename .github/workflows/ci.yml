name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-build:
    name: Build .sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .sdk
        run: npm install

      - name: Build
        working-directory: .sdk
        run: npm run build

  ts-build-test:
    name: TypeScript build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ts
        run: npm install

      - name: Build src
        working-directory: ts
        run: npx tsc --build src

      - name: Build test
        working-directory: ts
        run: npx tsc --build test

      - name: Verify test build output exists
        working-directory: ts
        run: ls dist-test/**/*.test.js

      - name: Remove .env.local if present
        working-directory: ts
        run: rm -f .env.local

      - name: Test (offline)
        working-directory: ts
        run: npm test

  go-build-test:
    name: Go build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache: false

      - name: Build
        working-directory: go
        run: go build ./...

      - name: Remove .env.local if present
        working-directory: go
        run: rm -f .env.local test/.env.local

      - name: Test (offline)
        working-directory: go
        run: go test ./... -v
